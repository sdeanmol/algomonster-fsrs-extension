<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AlgoMonster FSRS Data</title>
    <link rel="stylesheet" href="data.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-main">
                <h1 id="page-title">Loading Data...</h1>
                <p id="page-subtitle" class="subtitle"></p>
            </div>
            <div class="header-actions">
                <a href="../history/history.html" class="btn btn-secondary">📊 View History Map</a>
            </div>
        </div>

        <!-- Controls & Filters Panel -->
        <div class="filters-panel">
            <div class="search-box">
                <input type="text" id="search-input" class="input-field" placeholder="🔍 Search pattern title, URL, or tags...">
            </div>

            <div class="filters-row">
                <div class="filter-group">
                    <label for="tag-select">Filter by Tag</label>
                    <select id="tag-select" class="input-field select-field">
                        <option value="all">All Tags</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="status-select">Status</label>
                    <select id="status-select" class="input-field select-field">
                        <option value="all">All Cards</option>
                        <option value="due">Due for Review</option>
                        <option value="safe">Safe (Caught Up)</option>
                    </select>
                </div>

                <div class="filter-group reset-group">
                    <button id="clear-filters-btn" class="btn btn-text" style="display: none;">❌ Clear Filters</button>
                </div>
            </div>
        </div>

        <!-- Data Content / Table -->
        <div id="data-content" class="data-table-container">
            <!-- Dynamic data tables will be injected here -->
        </div>
    </div>
    
    <script src="data.js"></script>
</body>
</html>
