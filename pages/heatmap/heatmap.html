<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Activity Heatmap</title>
    <link rel="stylesheet" href="heatmap.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <div class="header-top">
                <h1>🟩 Contribution Heatmap</h1>
                <div class="heatmap-legend">
                    <span>Less</span>
                    <span class="legend-box level-0"></span>
                    <span class="legend-box level-1"></span>
                    <span class="legend-box level-2"></span>
                    <span class="legend-box level-3"></span>
                    <span class="legend-box level-4"></span>
                    <span>More</span>
                </div>
            </div>

            <!-- Filter Panel -->
            <div class="filter-bar">
                <span class="filter-title">🔍 Filter View:</span>
                <select id="filter-type" class="input-field select-field">
                    <option value="lifetime">Lifetime History</option>
                    <option value="year-wise">Year Wise</option>
                    <option value="month-wise">Month Wise</option>
                    <option value="day-wise">Day Wise</option>
                </select>

                <select id="select-year" class="input-field select-field hide-select"></select>
                <select id="select-month" class="input-field select-field hide-select"></select>
                <select id="select-day" class="input-field select-field hide-select"></select>
                
                <span id="filter-summary-text" class="filter-summary"></span>
            </div>
        </div>
        
        <!-- Heatmap Board -->
        <div class="heatmap-wrapper">
            <div class="heatmap-container">
                <!-- Weekday Labels -->
                <div class="weekday-labels">
                    <span>Sun</span>
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thu</span>
                    <span>Fri</span>
                    <span>Sat</span>
                </div>
                <!-- The Grid Cells -->
                <div class="heatmap" id="full-heatmap-grid"></div>
            </div>
        </div>

        <!-- Gamified Streaks Dashboard -->
        <div id="heatmap-stats-container" class="stats-grid">
            <!-- Dynamic stats cards will be loaded here by JS -->
        </div>
        
        <p class="tip-text">
            <em>Tip: Click on any colored square to view the specific algorithmic patterns you reviewed that day!</em>
        </p>
    </div>
    
    <script src="heatmap.js"></script>
</body>
</html>
