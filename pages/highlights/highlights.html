<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Highlighter Manager</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="highlights.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>
                    <svg class="svg-icon page-header-icon" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    Highlighted Snippets
                </h1>
                <p id="highlight-subtitle" class="subtitle">Loading highlights...</p>
            </div>
            <div class="header-actions">
                <button id="refresh-btn" class="btn btn-secondary">
                    <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- Search and Filters Panel -->
        <div class="filters-panel">
            <div class="search-box-wrapper">
                <svg class="svg-icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" class="input-field search-input" placeholder="Search in highlights or webpage titles...">
            </div>

            <div class="filters-row">
                <div class="filter-group">
                    <label for="webpage-select">Source Page</label>
                    <select id="webpage-select" class="input-field select-field">
                        <option value="all">All Pages</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sort-select">Sort By</label>
                    <select id="sort-select" class="input-field select-field">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="longest">Longest Snippet</option>
                        <option value="shortest">Shortest Snippet</option>
                        <option value="title">Webpage Title (A-Z)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Filter by Color</label>
                    <div id="color-filters-container" class="color-filters">
                        <!-- Dynamic color dots will go here -->
                    </div>
                </div>

                <div class="filter-group reset-group">
                    <button id="clear-filters-btn" class="btn btn-text" style="display: none;">
                        <svg class="svg-icon" viewBox="0 0 24 24" style="width:12px; height:12px; margin-right:4px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        Clear Filters
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Highlights List -->
        <div id="highlights-container" class="highlights-list">
            <!-- Highlight cards will be injected here via JS -->
        </div>
    </div>

    <!-- Status Toast for Clipboard Copy -->
    <div id="status-toast" class="toast">Text copied to clipboard!</div>

    <script src="highlights.js"></script>
</body>
</html>
