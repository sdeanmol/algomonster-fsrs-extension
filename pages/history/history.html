<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contribution History</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>
                    <svg class="svg-icon page-header-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Review Activity History
                </h1>
                <div id="breadcrumb" class="breadcrumb">All Years</div>
            </div>
            <div class="controls">
                <button id="view-year" class="active">Years</button>
                <button id="view-month">Months</button>
                <button id="view-day">Days</button>
            </div>
        </div>
        <div id="chart-container" class="grid">
            <!-- Data cards will be injected here via JS -->
        </div>
    </div>
    <script src="history.js"></script>
</body>
</html>
