<!--
  * @file features/dashboard/history/history.html
  * @description Visual layout page for tracking users' review activity history across years, months, and days.
  * Downstream script: features/dashboard/history/history.js
  -->
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Contribution History</title>
    <script src="../../common/theme-sync.js"></script>
    <link rel="stylesheet" href="../../common/base.css">
    <link rel="stylesheet" href="history.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>
                    <svg class="svg-icon page-header-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Review Activity History
                </h1>
                <div id="breadcrumb" class="breadcrumb">All Years</div>
            </div>
            <div class="controls">
                <button id="view-year" class="active">Years</button>
                <button id="view-month">Months</button>
                <button id="view-day">Days</button>
            </div>
        </div>
        <div id="history-chart-wrapper" class="panel chart-panel" style="margin-bottom: 24px; display: none;">
            <!-- Chart will be injected here -->
        </div>
        <div id="chart-container" class="grid">
            <!-- Data cards will be injected here via JS -->
        </div>
    </div>
    <script src="history.js"></script>
</body>
</html>
