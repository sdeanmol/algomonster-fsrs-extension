<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoRecall — Contests & Import</title>
    <link rel="stylesheet" href="contests.css">
</head>
<body>
    <div class="contest-app">
        <header class="contest-header">
            <div class="header-left">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <h1>Contests & Import</h1>
            </div>
            <div class="header-tabs">
                <button class="tab-btn active" data-tab="upcoming">Upcoming Contests</button>
                <button class="tab-btn" data-tab="import">Batch Import</button>
            </div>
        </header>

        <!-- Tab: Upcoming Contests -->
        <div id="tab-upcoming" class="tab-content active">
            <div class="contest-controls">
                <div class="platform-filters">
                    <button class="platform-filter active" data-platform="all">All</button>
                    <button class="platform-filter" data-platform="codeforces">Codeforces</button>
                    <button class="platform-filter" data-platform="leetcode">LeetCode</button>
                    <button class="platform-filter" data-platform="atcoder">AtCoder</button>
                </div>
                <button id="refresh-btn" class="icon-btn" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
            </div>
            <div id="contest-list" class="contest-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading contests…</p>
                </div>
            </div>
        </div>

        <!-- Tab: Batch Import -->
        <div id="tab-import" class="tab-content">
            <div class="import-section">
                <h2>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Virtual Contest Import
                </h2>
                <p class="import-desc">Paste a Codeforces contest URL or enter problem URLs to batch-create FSRS cards.</p>

                <div class="import-form">
                    <div class="form-group">
                        <label>Contest URL or Problem URLs</label>
                        <textarea id="import-urls" class="import-textarea" placeholder="Enter one URL per line, e.g.:&#10;https://codeforces.com/contest/1234&#10;https://leetcode.com/problems/two-sum/&#10;https://atcoder.jp/contests/abc123/tasks/abc123_a"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Default Tags (comma separated)</label>
                            <input type="text" id="import-tags" class="import-input" placeholder="e.g. contest, practice">
                        </div>
                        <div class="form-group">
                            <label>Difficulty</label>
                            <select id="import-difficulty" class="import-input">
                                <option value="">Auto-detect</option>
                                <option value="Easy">Easy</option>
                                <option value="Medium">Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>
                    </div>
                    <div class="import-actions">
                        <button id="import-btn" class="primary-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Import as FSRS Cards
                        </button>
                        <span id="import-status" class="import-status"></span>
                    </div>
                </div>

                <div id="import-preview" class="import-preview" style="display:none;">
                    <h3>Preview</h3>
                    <div id="import-preview-list"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="contests.js"></script>
</body>
</html>
