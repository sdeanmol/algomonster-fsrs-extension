<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AlgoRecall — Analytics Dashboard</title>
    <script src="../../common/theme-sync.js"></script>
    <script src="../../../dist/fsrsScheduler.bundle.js"></script>
    <link rel="stylesheet" href="../../common/base.css">
    <link rel="stylesheet" href="analytics.css">
</head>

<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg class="svg-icon logo-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    Analytics
                </h2>
            </div>
            <div class="nav-section-title">MAIN DASHBOARD</div>
            <ul class="nav-links">
                <li><button class="nav-btn active" data-tab="overview">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        Overview
                    </button></li>
                <li><button class="nav-btn" data-tab="readiness">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                        </svg>
                        Exam Readiness
                    </button></li>
            </ul>

            <div class="nav-section-title">MEMORY & SCIENCE</div>
            <ul class="nav-links">
                <li><button class="nav-btn" data-tab="memory">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 4.5a2.5 2.5 0 0 0-4.96.44 2.5 2.5 0 0 0-2.96 3.08 3 3 0 0 0-.34 5.58 2.5 2.5 0 0 0 1.32 4.24 2.5 2.5 0 0 0 4.44 2.04"></path>
                            <path d="M12 4.5a2.5 2.5 0 0 1 4.96.44 2.5 2.5 0 0 1 2.96 3.08 3 3 0 0 1 .34 5.58 2.5 2.5 0 0 1-1.32 4.24 2.5 2.5 0 0 1-4.44 2.04"></path>
                            <path d="M12 3v18"></path>
                        </svg>
                        Memory Retention
                    </button></li>
                <li><button class="nav-btn" data-tab="simulation">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 22h14"></path>
                            <path d="M5 2h14"></path>
                            <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"></path>
                            <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"></path>
                        </svg>
                        Future Memory Simulation
                    </button></li>
                <li><button class="nav-btn" data-tab="tags">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z">
                            </path>
                            <line x1="7" y1="7" x2="7.01" y2="7"></line>
                        </svg>
                        Tag Analytics
                    </button></li>
            </ul>

            <div class="nav-section-title">INSIGHTS & EFFICIENCY</div>
            <ul class="nav-links">
                <li><button class="nav-btn" data-tab="performance">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Performance
                    </button></li>
                <li><button class="nav-btn" data-tab="insights">
                        <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="2"></circle>
                            <path
                                d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14">
                            </path>
                        </svg>
                        Insights
                    </button></li>
            </ul>
            <div class="sidebar-footer">
                <a href="../popup/popup.html" class="btn btn-secondary w-full" style="text-align: center;">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right:6px;" aria-hidden="true">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Dashboard
                </a>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="main-header">
                <div class="main-header-info">
                    <h1 id="current-tab-title">Overview</h1>
                    <p class="subtitle" id="analytics-subtitle">Loading analytics...</p>
                </div>
                <div class="header-global-stats">
                    <div class="global-kpi-bar">
                        <div class="kpi-pill">
                            <span class="kpi-val" id="global-kpi-cards">0</span>
                            <span class="kpi-lbl">Cards</span>
                        </div>
                        <div class="kpi-pill">
                            <span class="kpi-val" id="global-kpi-retention">0%</span>
                            <span class="kpi-lbl">Retention</span>
                        </div>
                        <div class="kpi-pill warning">
                            <span class="kpi-val" id="global-kpi-due">0</span>
                            <span class="kpi-lbl">Due Today</span>
                        </div>
                        <div class="kpi-pill success">
                            <span class="kpi-val" id="global-kpi-readiness">0%</span>
                            <span class="kpi-lbl">Exam Recall</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="tab-content-container">
                <div id="tab-overview" class="tab-pane active"></div>
                <div id="tab-readiness" class="tab-pane"></div>
                <div id="tab-memory" class="tab-pane"></div>
                <div id="tab-simulation" class="tab-pane"></div>
                <div id="tab-tags" class="tab-pane"></div>
                <div id="tab-performance" class="tab-pane"></div>
                <div id="tab-insights" class="tab-pane"></div>
            </div>
        </main>
    </div>

    <!-- Ensure module import works -->
    <script type="module" src="analytics.js"></script>
</body>

</html>
