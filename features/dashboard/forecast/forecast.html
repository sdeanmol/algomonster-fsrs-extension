<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AlgoRecall — Review Forecast</title>
    <script src="../../common/theme-sync.js"></script>
    <link rel="stylesheet" href="../../common/base.css">
    <link rel="stylesheet" href="forecast.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-main">
                <h1>Review Forecast</h1>
                <p class="subtitle" id="forecast-subtitle">Loading...</p>
            </div>
            <div class="header-actions">
                <a href="../popup/popup.html" class="btn btn-secondary">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right: 6px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to Dashboard
                </a>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="forecast-summary">
            <div class="summary-card">
                <div class="summary-value" id="forecast-total">-</div>
                <div class="summary-label">Next 30 Days</div>
            </div>
            <div class="summary-card">
                <div class="summary-value" id="forecast-avg">-</div>
                <div class="summary-label">Daily Average</div>
            </div>
            <div class="summary-card">
                <div class="summary-value" id="forecast-peak">-</div>
                <div class="summary-label">Peak Day</div>
            </div>
            <div class="summary-card">
                <div class="summary-value" id="forecast-today">-</div>
                <div class="summary-label">Due Today</div>
            </div>
        </div>

        <!-- Calendar Grid -->
        <div class="forecast-calendar" id="forecast-calendar">
            <!-- Dynamically generated -->
        </div>
    </div>

    <script src="forecast.js"></script>
</body>
</html>
