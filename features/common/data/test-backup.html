<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Backup Optimization Test Runner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121214;
            color: #e4e4e7;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #3b82f6;
            border-bottom: 1px solid #27272a;
            padding-bottom: 10px;
        }
        .summary {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .test-case {
            background: #18181b;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #a1a1aa;
        }
        .test-case.pass {
            border-left-color: #22c55e;
        }
        .test-case.fail {
            border-left-color: #ef4444;
        }
        .test-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        .test-details {
            font-family: monospace;
            font-size: 0.9em;
            color: #a1a1aa;
            white-space: pre-wrap;
            background: #09090b;
            padding: 10px;
            border-radius: 4px;
            margin-top: 5px;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge.pass {
            background: #14532d;
            color: #4ade80;
        }
        .badge.fail {
            background: #7f1d1d;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <h1>🧠 Backup Optimization Test Runner</h1>
    <div class="summary" id="test-summary">
        Running integration tests...
    </div>
    <div id="test-cases"></div>

    <script type="module" src="test-backup.js?v=5"></script>
</body>
</html>
