<!--
  * @file features/common/data/data.html
  * @description Visual layout page presenting tables of saved problem cards.
  * Downstream script: features/common/data/data.js
  -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AlgoRecall Data Manager</title>
    <script src="../theme-sync.js"></script>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="data.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-main">
                <h1 id="page-title">Loading Data...</h1>
                <p id="page-subtitle" class="subtitle"></p>
            </div>
            <div class="header-actions">
                <a href="../../dashboard/history/history.html" class="btn btn-secondary">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right: 6px;"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    View History Map
                </a>
            </div>
        </div>

        <!-- R3.1 / R3.2 / R1.1: Analytics Graphs Panel -->
        <div id="analytics-panel" class="analytics-grid" style="display: none; margin-bottom: 24px;">
            <!-- Dynamic analytics graphs will be injected here -->
        </div>

        <!-- Controls & Filters Panel -->
        <div class="filters-panel">
            <div class="search-box-wrapper">
                <svg class="svg-icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" class="input-field search-input" placeholder="Search pattern title, URL, or tags...">
            </div>

            <div class="filters-row">
                <div class="filter-group">
                    <label for="tag-select">Filter by Tag</label>
                    <select id="tag-select" class="input-field select-field">
                        <option value="all">All Tags</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="status-select">Status</label>
                    <select id="status-select" class="input-field select-field">
                        <option value="all">All Cards</option>
                        <option value="due">Due for Review</option>
                        <option value="safe">Safe (Caught Up)</option>
                    </select>
                </div>

                <div class="filter-group reset-group">
                    <button id="clear-filters-btn" class="btn btn-text" style="display: none;">
                        <svg class="svg-icon" viewBox="0 0 24 24" style="width:12px; height:12px; margin-right:4px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        Clear Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Data Content / Table -->
        <div id="data-content" class="data-table-container">
            <!-- Dynamic data tables will be injected here -->
        </div>
    </div>
    
    <script src="data.js"></script>
</body>
</html>
