<!--
  * @file features/common/data/data.html
  * @description Visual layout page presenting tables of saved problem cards.
  * Enhanced with R2.6 (platform/state filters), R2.7 (bulk actions),
  * R2.8 (sort dropdown), R2.9 (inline editing).
  * Downstream script: features/common/data/data.js
  -->
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AlgoRecall Data Manager</title>
    <script src="../theme-sync.js"></script>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="data.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-main">
                <h1 id="page-title">Loading Data...</h1>
                <p id="page-subtitle" class="subtitle"></p>
            </div>
            <div class="header-actions">
                <a href="../../dashboard/analytics/analytics.html" class="btn btn-secondary" style="margin-right:8px;">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right:6px;" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Analytics
                </a>
                <a href="../../dashboard/history/history.html" class="btn btn-secondary">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right:6px;" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    View History Map
                </a>
            </div>
        </div>

        <!-- R3.1 / R3.2 / R1.1: Analytics Graphs Panel -->
        <div id="analytics-panel" class="analytics-grid" style="display: none; margin-bottom: 24px;">
            <!-- Dynamic analytics graphs will be injected here -->
        </div>

        <!-- Controls & Filters Panel -->
        <div class="filters-panel">
            <div class="search-box-wrapper">
                <svg class="svg-icon search-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" class="input-field search-input" placeholder="Search pattern title, URL, or tags...">
            </div>

            <div class="filters-row">
                <div class="filter-group">
                    <label for="tag-select">Filter by Tag</label>
                    <select id="tag-select" class="input-field select-field">
                        <option value="all">All Tags</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="status-select">Status</label>
                    <select id="status-select" class="input-field select-field">
                        <option value="all">All Cards</option>
                        <option value="due">Due for Review</option>
                        <option value="safe">Safe (Caught Up)</option>
                    </select>
                </div>

                <!-- R2.6: Platform Filter -->
                <div class="filter-group">
                    <label for="platform-select">Platform</label>
                    <select id="platform-select" class="input-field select-field">
                        <option value="all">All Platforms</option>
                    </select>
                </div>

                <!-- R2.6: FSRS State Filter -->
                <div class="filter-group">
                    <label for="state-select">FSRS State</label>
                    <select id="state-select" class="input-field select-field">
                        <option value="all">All States</option>
                        <option value="0">New</option>
                        <option value="1">Learning</option>
                        <option value="2">Review</option>
                        <option value="3">Relearning (Lapsed)</option>
                        <option value="leech">⚡ Leeches (3+ Lapses)</option>
                    </select>
                </div>

                <!-- R2.8: Sort Dropdown -->
                <div class="filter-group">
                    <label for="sort-select">Sort By</label>
                    <select id="sort-select" class="input-field select-field">
                        <option value="due-asc">Due Date (Soonest)</option>
                        <option value="due-desc">Due Date (Latest)</option>
                        <option value="difficulty-desc">Difficulty (Hardest)</option>
                        <option value="stability-desc">Stability (Highest)</option>
                        <option value="stability-asc">Stability (Lowest)</option>
                        <option value="lapses-desc">Lapses (Most)</option>
                        <option value="created-desc">Created (Newest)</option>
                        <option value="created-asc">Created (Oldest)</option>
                    </select>
                </div>

                <div class="filter-group reset-group">
                    <button id="clear-filters-btn" class="btn btn-text" style="display: none;">
                        <svg class="svg-icon" viewBox="0 0 24 24" style="width:12px; height:12px; margin-right:4px;" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        Clear Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- R2.7: Bulk Actions Bar -->
        <div id="bulk-actions-bar" class="bulk-actions-bar" style="display: none;">
            <div class="bulk-info">
                <span id="bulk-count">0</span> card(s) selected
            </div>
            <div class="bulk-buttons">
                <button id="bulk-delete-btn" class="btn btn-danger btn-sm">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="width:13px;height:13px;" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Delete Selected
                </button>
                <button id="bulk-retag-btn" class="btn btn-secondary btn-sm">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="width:13px;height:13px;" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                    Re-tag Selected
                </button>
                <button id="bulk-reschedule-btn" class="btn btn-secondary btn-sm">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="width:13px;height:13px;" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Reschedule
                </button>
                <button id="bulk-deselect-btn" class="btn btn-text btn-sm">
                    Deselect All
                </button>
            </div>
        </div>

        <!-- Data Content / Table -->
        <div id="data-content" class="data-table-container">
            <!-- Dynamic data tables will be injected here -->
        </div>
    </div>

    <!-- R2.9: Inline Edit Modal Overlay -->
    <div id="inline-edit-overlay" class="edit-overlay" style="display:none;">
        <div class="edit-modal">
            <div class="edit-modal-header">
                <h3 style="padding:0;margin:0;background:none;">Edit Card</h3>
                <button id="edit-close-btn" class="edit-close-btn">
                    <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="edit-modal-body">
                <input type="hidden" id="edit-card-id">
                <div class="edit-field">
                    <label for="edit-title">Problem Title</label>
                    <input type="text" id="edit-title" class="input-field" placeholder="Problem title...">
                </div>
                <div class="edit-field">
                    <label for="edit-tags">Tags (comma-separated)</label>
                    <input type="text" id="edit-tags" class="input-field" placeholder="Binary Search, DP, Graphs...">
                </div>
                <div class="edit-field-row">
                    <div class="edit-field">
                        <label for="edit-time-complexity">Time Complexity</label>
                        <input type="text" id="edit-time-complexity" class="input-field" placeholder="O(n log n)">
                    </div>
                    <div class="edit-field">
                        <label for="edit-space-complexity">Space Complexity</label>
                        <input type="text" id="edit-space-complexity" class="input-field" placeholder="O(n)">
                    </div>
                </div>
                <div class="edit-field">
                    <label for="edit-approach">Approach Notes</label>
                    <textarea id="edit-approach" class="input-field edit-textarea" rows="8" placeholder="Your approach notes..."></textarea>
                </div>
            </div>
            <div class="edit-modal-footer">
                <button id="edit-cancel-btn" class="btn btn-secondary">Cancel</button>
                <button id="edit-save-btn" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
</body>
</html>
