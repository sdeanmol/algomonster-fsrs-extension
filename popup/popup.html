<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AlgoMonster FSRS Dashboard</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <!-- Header -->
    <div class="header">
        <h2>🧠 AlgoMonster</h2>
    </div>

    <!-- Stats Row -->
    <div class="stats-grid">
        <div class="stat-box" id="box-total" title="View all saved patterns">
            <div class="stat-value" id="total-cards">-</div>
            <div class="stat-label">Patterns</div>
        </div>
        <div class="stat-box warning" id="box-due" title="View patterns due today">
            <div class="stat-value" id="due-cards">-</div>
            <div class="stat-label">Due Today</div>
        </div>
        <div class="stat-box" id="box-retention" title="View retention analytics">
            <div class="stat-value" id="retention-rate">-%</div>
            <div class="stat-label">Retention</div>
        </div>
    </div>

    <!-- Heatmap Panel -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">📊 Contribution Activity</span>
            <button id="open-heatmap-tab-btn" class="icon-btn" title="Open full screen heatmap">↗️ Full Screen</button>
        </div>
        <div class="heatmap-wrapper">
            <div id="heatmap-grid" class="heatmap"></div>
        </div>
        <div class="panel-actions">
            <button id="toggle-lifetime-btn" class="btn-text">Show Lifetime</button>
            <button id="history-btn" class="btn-text">Activity History</button>
        </div>
    </div>

    <!-- Highlighter Panel -->
    <div class="panel highlighter-panel">
        <div class="panel-header">
            <span class="panel-title highlight-title">🖍️ Highlighter Settings</span>
        </div>

        <label class="toggle-row">
            <span class="toggle-label">Floating Marker Menu</span>
            <div class="toggle-switch">
                <input type="checkbox" id="toggle-marker-popup" checked>
                <span class="slider"></span>
            </div>
        </label>

        <button id="open-options-btn" class="btn btn-secondary w-full" style="margin-bottom: 8px;">🎨 Customize
            Colors</button>

        <button id="manage-highlights-btn" class="btn btn-primary w-full">View All Highlights</button>
    </div>

    <!-- Data & Settings Panel -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">⚙️ Data & Options</span>
            <button id="toggle-settings-btn" class="icon-btn">Advanced ⚙️</button>
        </div>

        <div class="action-grid">
            <button id="export-btn" class="btn btn-secondary">💾 Export Backup</button>
            <label class="btn btn-secondary import-btn">
                📂 Import Backup
                <input type="file" id="import-file" accept=".json" style="display:none;">
            </label>
        </div>

        <!-- Advanced Settings Panel (Hidden by default) -->
        <div id="settings-panel" class="advanced-settings" style="display: none;">
            <div class="settings-subtitle">Custom Topic Weights (FSRS)</div>
            <div class="input-group">
                <input type="text" id="weight-tag" class="input-field" placeholder="Tag (e.g. Two Pointers)">
                <input type="text" id="weight-values" class="input-field" placeholder="17 comma-separated values">
                <button id="save-weights-btn" class="btn btn-accent w-full">Save Array</button>
            </div>

            <div class="saved-weights">
                <div class="saved-weights-title">Active Profiles:</div>
                <ul id="active-weights-list"></ul>
            </div>
        </div>
    </div>

    <!-- Status Message Toast -->
    <div id="status-msg" class="status-message"></div>

    <script src="popup.js"></script>
</body>

</html>
